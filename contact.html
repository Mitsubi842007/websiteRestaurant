<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Quintessential&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="restaurant.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header>
        <div class="logo">
            <img src="afbeeldingen/sakura leaf logo.png" alt="Sakura leaf logo">
            <span class="site-title">Mitsu no Sakura</span>
        </div>

        <nav class="menu">
            <a href="homepage.html">Home</a>
            <a href="contact.html">Contact</a>
            <a href="informatie.html">Informatie</a>
            <a href="menupage.html">Menu</a>
            <a href="loginpage.html">Log in</a>
        </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-placeholder">
            Background Picture
        </div>
    </section>

    <!-- CONTACT SECTION -->
    <section class="contact-layout">

        <!-- LINKER KOLOM -->
        <div class="contact-info">

            <h2>Contact</h2>

            <div class="map-box">
                Kaart / Adres Placeholder
            </div>

            <div class="info-text">
                <p><strong>Email:</strong> info@voorbeeld.nl</p>
                <p><strong>Telefoon:</strong> +31 6 12345678</p>
                <p><strong>Adres:</strong> Straatnaam 123, 1234 AB Stad</p>
            </div>

        </div>

        <!-- RECHTER KOLOM -->
        <div class="contact-form">

            <h2>Stuur Ons Een Bericht</h2>

            <div class="form-box">
                <form>
                    <input type="text" placeholder="Naam" required>
                    <input type="email" placeholder="Email" required>
                    <input type="text" placeholder="Onderwerp">
                    <textarea placeholder="Bericht" required></textarea>
                    <button type="submit">VERZENDEN</button>
                </form>
            </div>

        </div>

    </section>

</div>

</body>
</html>
