<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Quintessential&display=swap" rel="stylesheet">
<link rel="stylesheet" href="restaurant.css">
</head>

<body>

<div class="container">

    <header>
    <div class="logo">LOGO</div>
    <nav class="menu">
        <a href="homepage.html">Home</a>
        <a href="contact.html">Contact</a>
        <a href="informatie.html">Informatie</a>
        <a href="menupage.html">Menu</a>
        <a href="loginpage.html">Log in</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-placeholder">Background Picture</div>
</section>

<section class="categories">
    <span>Categorie</span>
    <button>Pizza</button>
    <button>Pasta</button>
    <button>Drinks</button>
</section>

<section class="products">

    <!-- PRODUCT 1 -->
    <div class="product">
        <div class="product-img">Foto</div>

        <div class="product-info">
            <h3>Pizza Margherita</h3>
            <p>Tomaat, Mozzarella, Basilicum</p>

            <input type="checkbox" id="item1" hidden>
            <label for="item1" class="add-btn">Toevoegen</label>
        </div>
    </div>

    <!-- PRODUCT 2 -->
    <div class="product">
        <div class="product-img">Foto</div>

        <div class="product-info">
            <h3>Pasta Carbonara</h3>
            <p>Room, Spek, Parmezaan</p>

            <input type="checkbox" id="item2" hidden>
            <label for="item2" class="add-btn">Toevoegen</label>
        </div>
    </div>

</section>

</div>

<!-- SIDE CART -->
<aside class="cart">
    <h2>Winkelwagen</h2>

    <div class="cart-items">
        <p class="cart-item item1">Pizza Margherita</p>
        <p class="cart-item item2">Pasta Carbonara</p>
    </div>

    <div class="checkout">
        Afrekenen
    </div>
</aside>

<footer>
    Footer
</footer>

</body>
</html>
